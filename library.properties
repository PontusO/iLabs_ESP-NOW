sentence=Arduino ESP-NOW API for RP2040/RP2350 hosts, bridged to an ESP32-C6/C3 co-processor over the iLabs AT+EN UART protocol.
paragraph=Source-compatible with the arduino-esp32 ESP_NOW class API (global ESP_NOW instance and ESP_NOW_Peer subclassing). The radio runs on an ESP32-C6/C3 flashed with the iLabs AT+EN ESP-NOW interpreter; this library speaks that AT protocol over a Serial link. Call ESP_NOW.setLink(channel) once in setup() in place of the ESP32 WiFi bring-up, and ESP_NOW.poll() in loop() to service received frames. iLabs Challenger+ platform.
